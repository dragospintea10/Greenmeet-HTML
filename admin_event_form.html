{% extends "base.html" %}

{% block title %}{% if event %}Edit Event{% else %}Create Event{% endif %}{% endblock %}

{% block content %}
<div class="top-bar">
    <div>
        <h1 class="page-title">{% if event %}Edit Event{% else %}Create Event{% endif %}</h1>
        <p class="subtitle">Fill in the event details.</p>
    </div>
</div>

<div class="form-card">
    <form method="POST">
        <label>Title</label>
        <input type="text" name="title" value="{{ event.title if event else '' }}" required>

        <label>Short Description</label>
        <input type="text" name="short_description" value="{{ event.short_description if event else '' }}" required>

        <label>Description</label>
        <textarea name="description" rows="5" required>{{ event.description if event else '' }}</textarea>

        <label>Date and Time</label>
        <input type="datetime-local" name="date_time" value="{{ event.date_time.strftime('%Y-%m-%dT%H:%M') if event else '' }}" required>

        <label>Location</label>
        <input type="text" name="location" value="{{ event.location if event else '' }}" required>

        <label>Category</label>
        <select name="category_id" required>
            {% for category in categories %}
                <option value="{{ category.id }}" {% if event and event.category.id == category.id %}selected{% endif %}>
                    {{ category.name }}
                </option>
            {% endfor %}
        </select>

        <button type="submit" class="btn btn-primary">{% if event %}Save Changes{% else %}Create Event{% endif %}</button>
    </form>
</div>
{% endblock %}

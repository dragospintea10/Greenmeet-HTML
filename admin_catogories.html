{% extends "base.html" %}

{% block title %}Manage Categories{% endblock %}

{% block content %}
<div class="top-bar">
    <div>
        <h1 class="page-title">Manage Categories</h1>
        <p class="subtitle">Create and remove event categories.</p>
    </div>
</div>

<div class="cards-grid two-columns">
    <div class="form-card">
        <form method="POST">
            <label>New Category</label>
            <input type="text" name="name" placeholder="Category name" required>
            <button type="submit" class="btn btn-primary">Create Category</button>
        </form>
    </div>

    <div class="table-card">
        <table>
            <thead>
                <tr>
                    <th>Category</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for category in categories %}
                    <tr>
                        <td>{{ category.name }}</td>
                        <td class="table-actions">
                            <form method="POST" action="{{ url_for('admin_delete_category', category_id=category.id) }}" class="inline-form">
                                <button type="submit" class="danger-link">Delete</button>
                            </form>
                        </td>
                    </tr>
                {% else %}
                    <tr>
                        <td colspan="2">No categories found.</td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
